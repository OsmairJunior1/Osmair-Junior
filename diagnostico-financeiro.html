<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Raio-X Financeiro | Osmair Junior</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F7F6;
    --surface:#FFFFFF;
    --navy:#0B2545;
    --navy-soft:#3C5470;
    --navy-wash:#E9ECF3;
    --teal:#12796A;
    --teal-light:#17916F;
    --teal-wash:#E4F1EC;
    --blue:#2C6E9E;
    --blue-wash:#E7F0F7;
    --amber:#B4791F;
    --amber-wash:#FBF1E1;
    --purple:#6753A6;
    --purple-wash:#EFEAF7;
    --red:#C0453A;
    --red-wash:#FBEAE8;
    --text-muted:#5B6B72;
    --border:#E2E8E6;
    --shadow: 0 1px 2px rgba(11,37,69,0.04), 0 8px 24px -12px rgba(11,37,69,0.12);
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--navy); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 12% 8%, rgba(18,121,106,0.08), transparent 42%),
      radial-gradient(circle at 88% 92%, rgba(11,37,69,0.06), transparent 45%),
      var(--bg);
  }

  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }

  .app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    margin:0 auto;
    background:var(--surface);
    display:flex;
    flex-direction:column;
    position:relative;
  }

  @media (min-width:640px){
    body{ padding:40px 20px; }
    .app{
      min-height:auto;
      border-radius:26px;
      box-shadow: 0 24px 70px -20px rgba(11,37,69,0.28), 0 4px 16px rgba(11,37,69,0.08);
      overflow:hidden;
    }
  }

  /* ---------- Header / progress ---------- */
  .topbar{
    display:flex; align-items:center; gap:14px;
    padding:18px 22px 10px;
    position:sticky; top:0; background:var(--surface); z-index:5;
  }
  .back-btn{
    background:none; border:none; padding:6px; margin:-6px;
    cursor:pointer; color:var(--navy-soft); display:flex; border-radius:8px;
    transition: background 0.15s ease;
  }
  .back-btn:hover{ background:var(--bg); }
  .back-btn svg{ width:20px; height:20px; }
  .back-btn.hidden{ visibility:hidden; }

  .segments{ flex:1; display:flex; gap:5px; }
  .segment{ flex:1; height:6px; background:var(--bg); border-radius:100px; overflow:hidden; }
  .segment-fill{ height:100%; width:0%; border-radius:100px; transition: width 0.4s ease; background:linear-gradient(90deg, var(--navy), var(--teal)); }

  .qcount{ padding:0 22px 14px; font-size:12px; color:var(--text-muted); font-weight:600; }

  /* ---------- Screen container ---------- */
  .screen-wrap{ flex:1; display:flex; flex-direction:column; padding:8px 24px 34px; }
  .screen{ display:flex; flex-direction:column; flex:1; animation: slideIn 0.35s ease-out; }
  @keyframes slideIn{ from{ opacity:0; transform:translateX(14px); } to{ opacity:1; transform:translateX(0); } }

  .pillar-tag{
    display:inline-flex; align-items:center; gap:7px; align-self:flex-start;
    font-size:11.5px; font-weight:700; letter-spacing:0.4px; text-transform:uppercase;
    padding:6px 12px; border-radius:100px; margin-bottom:14px;
  }
  .pillar-tag svg{ width:13px; height:13px; }

  h1.q-title{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:21px;
    line-height:1.32; margin:0 0 20px; letter-spacing:-0.2px;
  }
  p.q-sub{ font-size:14px; color:var(--text-muted); line-height:1.55; margin:0 0 20px; }

  /* ---------- Options ---------- */
  .options{ display:flex; flex-direction:column; gap:10px; margin-top:auto; }
  .opt-btn{
    display:flex; align-items:center; gap:12px;
    width:100%; text-align:left; padding:16px 16px;
    border:1.5px solid var(--border); border-radius:14px;
    background:var(--surface); cursor:pointer;
    font-family:'Inter',sans-serif; font-size:15px; font-weight:500; color:var(--navy);
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }
  .opt-btn:hover{ border-color:var(--teal); background:var(--teal-wash); }
  .opt-btn:active{ transform:scale(0.98); }
  .opt-btn.selected{ border-color:var(--teal); background:var(--teal-wash); }
  .opt-radio{ flex:0 0 auto; width:20px; height:20px; border-radius:50%; border:2px solid var(--border); position:relative; }
  .opt-btn.selected .opt-radio{ border-color:var(--teal); }
  .opt-btn.selected .opt-radio::after{ content:""; position:absolute; inset:3px; border-radius:50%; background:var(--teal); }

  /* ---------- Micro-interaction ---------- */
  .micro-card{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:18px; padding:20px 6px;
  }
  .micro-icon{ width:56px; height:56px; border-radius:50%; background:var(--teal-wash); color:var(--teal); display:flex; align-items:center; justify-content:center; }
  .micro-icon svg{ width:26px; height:26px; }
  .micro-text{ font-size:16px; line-height:1.55; color:var(--navy-soft); max-width:320px; }

  /* ---------- Buttons ---------- */
  .primary-btn{
    width:100%; padding:16px; border:none; border-radius:14px;
    background:linear-gradient(155deg, var(--navy) 0%, var(--teal) 130%);
    color:#fff; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15.5px;
    cursor:pointer; transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: var(--shadow);
  }
  .primary-btn:hover{ transform:translateY(-2px); }
  .primary-btn:active{ transform:translateY(0) scale(0.98); }
  .primary-btn:disabled{ opacity:0.45; cursor:not-allowed; transform:none; }

  /* ---------- Intro ---------- */
  .intro-screen{ flex:1; display:flex; flex-direction:column; justify-content:center; padding:18px 0; }
  .intro-badge{ align-self:flex-start; font-size:12.5px; font-weight:600; color:var(--teal); background:var(--teal-wash); padding:5px 12px; border-radius:100px; margin-bottom:16px; }
  .intro-screen h1{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:26px; line-height:1.28; margin:0 0 14px; letter-spacing:-0.3px; }
  .intro-screen > p{ font-size:14.5px; color:var(--text-muted); line-height:1.6; margin:0 0 20px; }
  .intro-list{ list-style:none; padding:0; margin:0 0 28px; display:flex; flex-direction:column; gap:10px; }
  .intro-list li{ display:flex; gap:10px; align-items:flex-start; font-size:14.5px; font-weight:500; color:var(--navy); }
  .intro-list li svg{ flex:0 0 auto; width:18px; height:18px; color:var(--teal); margin-top:1px; }

  /* ---------- Form ---------- */
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:13px; font-weight:600; color:var(--navy-soft); margin-bottom:6px; }
  .field input{
    width:100%; padding:14px 15px; border:1.5px solid var(--border); border-radius:12px;
    font-family:'Inter',sans-serif; font-size:15px; color:var(--navy); background:var(--bg);
    transition: border-color 0.15s ease;
  }
  .field input:focus{ outline:none; border-color:var(--teal); background:var(--surface); }
  .form-note{ font-size:12px; color:var(--text-muted); text-align:center; margin-top:14px; line-height:1.5; }

  /* ---------- Result ---------- */
  .result-hero{ display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:26px; }
  .score-ring-wrap{ position:relative; width:150px; height:150px; margin-bottom:14px; }
  .score-ring-wrap svg{ width:150px; height:150px; transform:rotate(-90deg); }
  .score-ring-track{ fill:none; stroke:var(--bg); stroke-width:10; }
  .score-ring-fill{ fill:none; stroke-width:10; stroke-linecap:round; transition: stroke-dashoffset 1s ease-out; }
  .score-center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .score-center .num{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:34px; letter-spacing:-1px; }
  .score-center .den{ font-size:12px; color:var(--text-muted); font-weight:600; }
  .level-tag{ font-size:12.5px; font-weight:700; letter-spacing:0.3px; padding:6px 14px; border-radius:100px; margin-bottom:10px; }
  .level-name{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:19px; margin:0 0 8px; }
  .level-desc{ font-size:14px; color:var(--text-muted); line-height:1.55; max-width:340px; }

  .section-label{ font-size:12.5px; font-weight:700; letter-spacing:0.4px; text-transform:uppercase; color:var(--navy-soft); margin:26px 0 14px; }

  /* radar + legend */
  .radar-wrap{ display:flex; justify-content:center; margin-bottom:6px; }
  .pillar-legend{ list-style:none; padding:0; margin:14px 0 0; display:flex; flex-direction:column; gap:10px; }
  .pillar-legend li{ display:flex; align-items:center; gap:10px; }
  .pillar-dot{ width:10px; height:10px; border-radius:50%; flex:0 0 auto; }
  .pillar-legend .name{ font-size:13.5px; font-weight:500; color:var(--navy); flex:0 0 auto; width:118px; }
  .pillar-bar-track{ flex:1; height:7px; background:var(--bg); border-radius:100px; overflow:hidden; }
  .pillar-bar-fill{ height:100%; border-radius:100px; }
  .pillar-legend .pct{ font-size:12.5px; font-weight:700; color:var(--navy-soft); width:34px; text-align:right; flex:0 0 auto; }

  /* plano de ação */
  .focus-card{ background:var(--navy-wash); border-radius:16px; padding:18px 20px; margin-bottom:6px; }
  .focus-card .label{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.3px; color:var(--navy-soft); margin-bottom:4px; }
  .focus-card .pname{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:17px; }

  .risk-list, .action-list{ list-style:none; padding:0; margin:14px 0; display:flex; flex-direction:column; gap:10px; }
  .risk-list li, .action-list li{ display:flex; gap:10px; align-items:flex-start; font-size:14px; color:var(--navy-soft); line-height:1.5; }
  .risk-list li svg{ flex:0 0 auto; width:16px; height:16px; margin-top:2px; color:var(--red); }
  .action-list li svg{ flex:0 0 auto; width:16px; height:16px; margin-top:2px; color:var(--teal); }

  .impact-box{ background:var(--teal-wash); border-radius:14px; padding:16px 18px; margin-top:6px; }
  .impact-box p{ margin:0; font-size:14px; font-weight:600; color:var(--navy); line-height:1.5; }

  /* ---------- Offer ---------- */
  .offer-list{ list-style:none; padding:0; margin:18px 0 22px; display:flex; flex-direction:column; gap:10px; }
  .offer-list li{ display:flex; gap:10px; align-items:flex-start; font-size:14.5px; color:var(--navy-soft); }
  .offer-list li svg{ flex:0 0 auto; width:17px; height:17px; margin-top:2px; color:var(--teal); }

  .event-box{ display:flex; gap:12px; align-items:center; background:var(--blue-wash); border-radius:14px; padding:14px 16px; margin-bottom:18px; }
  .event-box .icon{ width:38px; height:38px; border-radius:10px; background:var(--surface); color:var(--blue); display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .event-box .icon svg{ width:19px; height:19px; }
  .event-box p{ margin:0; font-size:13.5px; font-weight:600; color:var(--navy); line-height:1.4; }

  .price-box{ background:linear-gradient(155deg, var(--navy) 0%, var(--teal) 130%); border-radius:18px; padding:24px 22px; text-align:center; color:#fff; margin-bottom:10px; }
  .price-old{ font-size:14px; text-decoration:line-through; opacity:0.65; margin-bottom:2px; }
  .price-new{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:34px; letter-spacing:-0.5px; }
  .price-note{ font-size:12.5px; opacity:0.85; margin-top:8px; line-height:1.4; }

  .footer-note{ text-align:center; font-size:11.5px; color:#9AA6AA; margin-top:22px; }

  @media (max-width:340px){
    h1.q-title{ font-size:19px; }
    .screen-wrap{ padding:8px 18px 28px; }
  }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
/* ============ ICONS ============ */
const ICONS = {
  back: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>`,
  spark: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.2 6.8L21 11l-6.8 2.2L12 20l-2.2-6.8L3 11l6.8-2.2z"/></svg>`,
  check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`,
  alert: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>`,
  clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`,
  wallet: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h13a1 1 0 0 1 1 1v3M3 7v10a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1h-4a2 2 0 0 0 0 4h5"/></svg>`,
  flow: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12c3 0 3-6 6-6s3 6 6 6 3-6 6-6"/><path d="M15 4l3 2-3 2"/></svg>`,
  trophy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M17 5h3a3 3 0 0 1-3 5M7 5H4a3 3 0 0 0 3 5"/></svg>`,
  chart: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7"/></svg>`,
  target: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>`,
  calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>`
};

/* ============ PILLARS ============ */
const PILLARS = [
  { id:"p1", name:"Organização Financeira", short:"Organização", icon:"wallet", color:"var(--teal)", wash:"var(--teal-wash)", questionIds:["q1","q2","q3","q4","q5"] },
  { id:"p2", name:"Controle do Caixa", short:"Caixa", icon:"flow", color:"var(--blue)", wash:"var(--blue-wash)", questionIds:["q6","q7","q8","q9","q10"] },
  { id:"p3", name:"Rentabilidade", short:"Rentabilidade", icon:"trophy", color:"var(--amber)", wash:"var(--amber-wash)", questionIds:["q11","q12","q13","q14","q15"] },
  { id:"p4", name:"Indicadores e Gestão", short:"Indicadores", icon:"chart", color:"var(--purple)", wash:"var(--purple-wash)", questionIds:["q16","q17","q18","q19","q20"] },
  { id:"p5", name:"Planejamento Financeiro", short:"Planejamento", icon:"target", color:"var(--navy)", wash:"var(--navy-wash)", questionIds:["q21","q22","q23","q24","q25"] }
];
function pillarOf(qid){ return PILLARS.find(p => p.questionIds.includes(qid)); }
function pillarIndex(qid){ return PILLARS.findIndex(p => p.questionIds.includes(qid)); }

/* ============ QUESTIONS (25, lineares) ============ */
const ORDER = [];
for(let i=1;i<=25;i++) ORDER.push("q"+i);

const QUESTIONS = {
  q1:{ title:"Você possui uma conta bancária exclusiva para a empresa?",
    options:[{label:"Sim",value:"sim",score:2},{label:"Não",value:"nao",score:0}],
    micro:{ sim:"Excelente. Separar as contas evita decisões baseadas em números distorcidos.", nao:"Misturar dinheiro pessoal e empresarial é uma das maiores causas de desorganização financeira." } },
  q2:{ title:"Você possui um pró-labore definido para os sócios?",
    options:[{label:"Sim",value:"sim",score:2},{label:"Parcialmente",value:"parcial",score:1},{label:"Não",value:"nao",score:0}],
    micro:{ default:"Sem pró-labore fica impossível saber quanto a empresa realmente gera de lucro." } },
  q3:{ title:"Você registra todas as entradas e saídas financeiras?",
    options:[{label:"Todos os dias",value:"todos_dias",score:2},{label:"Algumas vezes",value:"algumas",score:1},{label:"Quase nunca",value:"quase_nunca",score:0}],
    micro:{ default:"Empresas sem registros normalmente tomam decisões baseadas em sensação e não em números." } },
  q4:{ title:"Você sabe exatamente quanto custa manter sua empresa funcionando por mês?",
    options:[{label:"Sim",value:"sim",score:2},{label:"Tenho uma ideia",value:"ideia",score:1},{label:"Não",value:"nao",score:0}],
    micro:{ default:"Conhecer o custo fixo mensal é a base para saber quanto sua empresa precisa faturar." } },
  q5:{ title:"Você consegue dizer hoje quanto dinheiro realmente pertence à empresa?",
    options:[{label:"Sim",value:"sim",score:2},{label:"Mais ou menos",value:"mais_menos",score:1},{label:"Não",value:"nao",score:0}],
    micro:{ default:"Saber o que realmente pertence à empresa evita gastar dinheiro que na verdade é de impostos ou de terceiros." } },

  q6:{ title:"Você atualiza seu fluxo de caixa com frequência?",
    options:[{label:"Diariamente",value:"diariamente",score:2},{label:"Semanalmente",value:"semanalmente",score:1},{label:"Raramente",value:"raramente",score:0}],
    micro:{ default:"Um fluxo de caixa atualizado é o mapa que evita surpresas no fim do mês." } },
  q7:{ title:"Nos últimos três meses faltou dinheiro em caixa para pagar alguma conta?",
    options:[{label:"Nunca",value:"nunca",score:2},{label:"Uma vez",value:"uma_vez",score:1},{label:"Mais de uma vez",value:"mais_uma",score:0}],
    micro:{ default:"Faltar dinheiro em caixa geralmente é sinal de fluxo de caixa mal acompanhado, não falta de vendas." } },
  q8:{ title:"Você faz previsão de entradas e saídas futuras?",
    options:[{label:"Sim",value:"sim",score:2},{label:"Às vezes",value:"as_vezes",score:1},{label:"Nunca",value:"nunca",score:0}],
    micro:{ default:"Prever entradas e saídas futuras transforma decisões de reativas em estratégicas." } },
  q9:{ title:"Quando surge uma despesa inesperada, sua empresa consegue absorver?",
    options:[{label:"Sempre",value:"sempre",score:2},{label:"Às vezes",value:"as_vezes",score:1},{label:"Quase nunca",value:"quase_nunca",score:0}],
    micro:{ default:"Empresas com reserva absorvem imprevistos sem comprometer o caixa do mês." } },
  q10:{ title:"Você possui uma reserva financeira empresarial?",
    options:[{label:"Sim",value:"sim",score:2},{label:"Em construção",value:"construcao",score:1},{label:"Não",value:"nao",score:0}],
    micro:{ default:"Uma reserva financeira é o que separa um imprevisto de uma crise." } },

  q11:{ title:"Você conhece sua margem de lucro?",
    options:[{label:"Sim",value:"sim",score:2},{label:"Aproximadamente",value:"aprox",score:1},{label:"Não",value:"nao",score:0}],
    micro:{ default:"Conhecer a margem de lucro evita vender bastante e lucrar pouco." } },
  q12:{ title:"Você sabe quais produtos ou serviços geram mais lucro?",
    options:[{label:"Sim",value:"sim",score:2},{label:"Alguns",value:"alguns",score:1},{label:"Não",value:"nao",score:0}],
    micro:{ default:"Saber quais produtos realmente dão lucro ajuda a direcionar esforços de venda." } },
  q13:{ title:"Você revisa seus preços periodicamente?",
    options:[{label:"Sim",value:"sim",score:2},{label:"Somente quando necessário",value:"quando_necessario",score:1},{label:"Nunca",value:"nunca",score:0}],
    micro:{ default:"Preços desatualizados corroem a margem aos poucos, sem que você perceba." } },
  q14:{ title:"Seu preço considera todos os custos da empresa?",
    options:[{label:"Sim",value:"sim",score:2},{label:"A maioria",value:"maioria",score:1},{label:"Não sei",value:"nao_sei",score:0}],
    micro:{ default:"Um preço que não cobre todos os custos gera prejuízo mesmo em vendas altas." } },
  q15:{ title:"Você sabe qual é o faturamento mínimo para pagar todas as despesas?",
    options:[{label:"Sim",value:"sim",score:2},{label:"Já ouvi falar",value:"ja_ouvi",score:1},{label:"Não",value:"nao",score:0}],
    micro:{ default:"O faturamento mínimo é a linha que separa lucro de prejuízo todo mês." } },

  q16:{ title:"Você acompanha indicadores financeiros?",
    options:[{label:"Sim",value:"sim",score:2},{label:"Poucos",value:"poucos",score:1},{label:"Nenhum",value:"nenhum",score:0}],
    micro:{ default:"Indicadores certos tiram a gestão do achismo e trazem previsibilidade." } },
  q17:{ title:"Você recebe relatórios financeiros regularmente?",
    options:[{label:"Mensalmente",value:"mensalmente",score:2},{label:"Esporadicamente",value:"esporadicamente",score:1},{label:"Nunca",value:"nunca",score:0}],

/* ============ NAVIGATION ============ */
function goTo(id, { pushHistory = true } = {}){
  if(pushHistory) state.history.push(state.screen);
  state.screen = id;
  render();
}
function goBack(){
  if(state.history.length === 0) return;
  const prev = state.history.pop();
  if(QUESTIONS[prev]){
    const idx = state.answeredIds.indexOf(prev);
    if(idx !== -1) state.answeredIds = state.answeredIds.slice(0, idx);
  }
  state.screen = prev;
  render();
}
function markAnswered(qid){ if(!state.answeredIds.includes(qid)) state.answeredIds.push(qid); }

function nextQuestionId(qid){
  const idx = ORDER.indexOf(qid);
  return idx < ORDER.length - 1 ? ORDER[idx+1] : "form";
}

function answerQuestion(qid, value){
  state.answers[qid] = value;
  markAnswered(qid);
  goTo("micro:" + qid + ":" + value);
}
function proceedFromMicro(qid){
  goTo(nextQuestionId(qid), { pushHistory:false });
}

/* ============ SCORING ============ */
function computeScores(){
  const perPillar = {};
  PILLARS.forEach(p => perPillar[p.id] = { sum:0, max:0 });
  let totalSum = 0, totalMax = 0;

  Object.keys(state.answers).forEach(qid => {
    const q = QUESTIONS[qid];
    if(!q) return;
    const opt = q.options.find(o => o.value === state.answers[qid]);
    if(!opt) return;
    const p = pillarOf(qid);
    perPillar[p.id].sum += opt.score;
    perPillar[p.id].max += 2;
    totalSum += opt.score;
    totalMax += 2;
  });

  const pillarPct = PILLARS.map(p => ({
    ...p,
    pct: perPillar[p.id].max > 0 ? Math.round((perPillar[p.id].sum / perPillar[p.id].max) * 100) : 0
  }));
  const notaGeral = totalMax > 0 ? Math.round((totalSum / totalMax) * 100) : 0;
  return { pillarPct, notaGeral };
}

/* ============ RADAR SVG ============ */
function renderRadarSVG(pillarPct){
  const cx = 140, cy = 128, maxR = 92;
  const n = pillarPct.length;
  const pt = (r, i) => {
    const angle = (-90 + (360/n) * i) * Math.PI/180;
    return [cx + r*Math.cos(angle), cy + r*Math.sin(angle)];
  };
  let grid = "";
  [0.25,0.5,0.75,1].forEach(f => {
    const pts = pillarPct.map((_,i) => pt(maxR*f, i).join(",")).join(" ");
    grid += `<polygon points="${pts}" fill="none" stroke="#E2E8E6" stroke-width="1"/>`;
  });
  let axes = "";
  pillarPct.forEach((_,i) => {
    const [x,y] = pt(maxR, i);
    axes += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#E2E8E6" stroke-width="1"/>`;
  });
  const dataPts = pillarPct.map((p,i) => pt(maxR*(p.pct/100), i));
  const dataPoly = dataPts.map(p => p.join(",")).join(" ");
  let dots = "";
  dataPts.forEach(([x,y]) => { dots += `<circle cx="${x}" cy="${y}" r="4" fill="#12796A"/>`; });

  return `
    <svg viewBox="0 0 280 256" width="240" height="220">
      ${grid}
      ${axes}
      <polygon points="${dataPoly}" fill="rgba(18,121,106,0.18)" stroke="#12796A" stroke-width="2.5"/>
      ${dots}
    </svg>
  `;
}

/* ============ RENDER ============ */
function render(){
  const app = document.getElementById("app");
  const screen = state.screen;

  if(screen.startsWith("micro:")){
    const parts = screen.split(":");
    return renderMicro(app, parts[1], parts[2]);
  }
  if(screen === "intro") return renderIntro(app);
  if(screen === "form") return renderForm(app);
  if(screen === "result") return renderResult(app);
  if(screen === "offer") return renderOffer(app);

  const q = QUESTIONS[screen];
  if(q) return renderQuestion(app, screen, q);
}

function shell(app, { showTop = true } = {}){
  app.innerHTML = "";
  if(showTop){
    const top = document.createElement("div");
    top.className = "topbar";
    const back = document.createElement("button");
    back.className = "back-btn" + (state.history.length === 0 ? " hidden" : "");
    back.innerHTML = ICONS.back;
    back.onclick = goBack;
    top.appendChild(back);

    const segWrap = document.createElement("div");
    segWrap.className = "segments";
    const answeredCount = state.answeredIds.length;
    PILLARS.forEach((p, i) => {
      const seg = document.createElement("div");
      seg.className = "segment";
      const fill = document.createElement("div");
      fill.className = "segment-fill";
      let pct = 0;
      if(i * 5 < answeredCount){
        pct = Math.min(100, Math.max(0, ((answeredCount - i*5) / 5) * 100));
      }
      fill.style.width = pct + "%";
      seg.appendChild(fill);
      segWrap.appendChild(seg);
    });
    top.appendChild(segWrap);
    app.appendChild(top);

    const count = document.createElement("div");
    count.className = "qcount";
    count.textContent = `Pergunta ${Math.min(answeredCount + 1, 25)} de 25`;
    app.appendChild(count);
  }
  const wrap = document.createElement("div");
  wrap.className = "screen-wrap";
  app.appendChild(wrap);
  return wrap;
}
